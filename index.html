<!DOCTYPE html>
<html lang="en" dir="ltr">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>color-clipmarks</title>
		<link rel="stylesheet" href="./css/style.css">
	</head>
	<body>
		<template id="template">
			<div class="swatch">
				<p data-user=""></p>
				<p data-hex="" hidden="true"></p>
				<p data-rgb="" hidden="true"></p>
				<p data-hsl="" hidden="true"></p>
			</div>
		</template>
		<h1>color-clipmarks</h1>
		<main>
			<div id="colorContainer"></div>
			<div id="utilContainer">
				<label id="listFormatLabel" for="listFormat">List Format: <select id="listFormat" name="listFormat">
						<option value="user" selected>User</option>
						<option value="rgb">RGB</option>
						<option value="hex">HEX</option>
						<option value="hsl">HSL</option>
					</select>
				</label>
				<textarea id="textarea" spellcheck="false"></textarea>
				<button id="submitBtn" type="button">submit</button>
				<button id="selectBtn" type="button">select list</button>
				<button id="copyBtn" type="button">copy list</button>
				<button id="sortBtn" type="button">sort colors</button>
				<button id="removeDuplBtn" type="button">unique</button>
				<input id="fileUpload" type="file">
				<button id="importBtn" type="button">import</button>
				<!-- <button id="exportBtn" type="button">export</button> -->
			</div>
		</main>
		<footer id="footer">
			<!-- TODO: collapse to menu button ( device width: 450px ) -->
			<label for="userMode">
				<input id="userMode" type="radio" name="format" value="user">User</label>
			<label for="hexMode">
				<input id="hexMode" type="radio" name="format" value="hex">HEX</label>
			<label for="rgbMode">
				<input id="rgbMode" type="radio" name="format" value="rgb">RGB</label>
			<label for="hslMode">
				<input id="hslMode" type="radio" name="format" value="hsl">HSL</label>
		</footer>
		<script src="./js/index.js" charset="utf-8"></script>
	</body>
</html>
